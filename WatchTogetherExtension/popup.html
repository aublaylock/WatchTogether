<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamShare</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #18181b;
    --border: #27272a;
    --accent: #e2ff5d;
    --accent-dim: rgba(226,255,93,0.12);
    --text: #fafafa;
    --muted: #71717a;
    --red: #ff5d5d;
    --red-dim: rgba(255,93,93,0.12);
  }

  body {
    width: 280px;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 16px;
    user-select: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo {
    width: 22px;
    height: 22px;
    background: var(--accent);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo svg { width: 13px; height: 13px; }

  h1 {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .desc {
    color: var(--muted);
    line-height: 1.5;
    font-size: 12px;
  }

  button {
    width: 100%;
    padding: 9px 14px;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  button:active { transform: scale(0.98); }

  .btn-secondary {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover    { color: var(--text); border-color: #3f3f46; }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-msg {
    font-size: 12px;
    color: var(--red);
    background: var(--red-dim);
    border: 1px solid rgba(255,93,93,0.2);
    border-radius: 7px;
    padding: 8px 10px;
    line-height: 1.4;
    display: none;
  }
  .error-msg.visible { display: block; }

  .preview-wrap {
    display: none;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #000;
    line-height: 0;
  }
  .preview-wrap img { width: 100%; display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 13 13" fill="none">
      <path d="M2 6.5L6.5 2L11 6.5L6.5 11L2 6.5Z" fill="#0e0e10"/>
      <circle cx="6.5" cy="6.5" r="2" fill="#0e0e10"/>
    </svg>
  </div>
  <h1>StreamShare</h1>
</header>

<p class="desc">Share the video playing on this tab with a friend — they'll see exactly what you see, in real time.</p>

<div class="preview-wrap" id="preview-wrap">
  <img id="preview-img" alt="video preview"/>
</div>

<div class="error-msg" id="error-msg"></div>

<button class="btn-secondary" id="btn-preview">Preview video</button>

<script src="popup.js"></script>
</body>
</html>
