<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StreamShare — Viewer test</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: monospace; max-width: 700px; margin: 2rem auto; padding: 0 1rem; background: #0e0e10; color: #eee; }
    h2 { color: #e2ff5d; }
    h3 { color: #aaa; margin-top: 1.5rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; background: #e2ff5d; border: none; font-family: monospace; font-weight: bold; }
    button:disabled { opacity: 0.4; cursor: default; }
    textarea { width: 100%; height: 100px; background: #1a1a1d; color: #eee; border: 1px solid #333; padding: 0.4rem; font-family: monospace; font-size: 0.8rem; }
    input[type=text] { width: 100%; background: #1a1a1d; color: #eee; border: 1px solid #333; padding: 0.4rem; font-family: monospace; margin-bottom: 0.3rem; }
    label { font-size: 0.85rem; color: #aaa; }
    pre { background: #111; padding: 0.5rem; height: 200px; overflow-y: auto; font-size: 0.78rem; line-height: 1.4; margin: 0; }
    .card { border: 1px solid #333; padding: 0.8rem; margin: 0.5rem 0; }
    .ok   { color: #6f6; }
    .warn { color: #fa0; }
    .err  { color: #f55; }
    .dim  { color: #666; }
    #status { font-size: 1rem; font-weight: bold; margin: 0.5rem 0; min-height: 1.4em; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    td, th { border: 1px solid #333; padding: 0.3rem 0.5rem; text-align: left; }
    th { background: #1a1a1d; color: #aaa; }
  </style>
</head>
<body>
  <h2>Viewer</h2>

  <!-- ── TURN credentials ───────────────────────────────── -->
  <div class="card">
    <h3 style="margin-top:0">TURN credentials (optional — must match sharer)</h3>
    <label>TURN URL</label>
    <input type="text" id="turn-url" placeholder="turn:openrelay.metered.ca:80">
    <label>Username</label>
    <input type="text" id="turn-user" placeholder="openrelayproject">
    <label>Credential</label>
    <input type="text" id="turn-pass" placeholder="openrelayproject">
  </div>

  <!-- ── Phase 1 ────────────────────────────────────────── -->
  <div class="card">
    <h3 style="margin-top:0">Phase 1 — Gather diagnostic</h3>
    <p style="color:#aaa;font-size:0.85rem;margin:0 0 0.5rem">Tests each ICE config locally. No exchange needed.</p>
    <button id="btn-gather">Run gather test</button>
    <div style="margin-top:0.8rem">
      <table id="gather-table">
        <thead><tr><th>Config</th><th>host</th><th>srflx</th><th>relay</th><th>time (ms)</th><th>result</th></tr></thead>
        <tbody id="gather-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ── Phase 2 ────────────────────────────────────────── -->
  <div class="card">
    <h3 style="margin-top:0">Phase 2 — Connection test</h3>
    <textarea id="offer-in" placeholder="Paste the sharer's offer code here…"></textarea>
    <button id="btn-connect" style="margin-top:0.3rem">Connect</button>

    <div style="margin-top:0.8rem">
      <textarea id="answer-out" readonly placeholder="Your answer code will appear here — copy and send to sharer…"></textarea>
    </div>

    <div id="status"></div>
  </div>

  <!-- ── Log ───────────────────────────────────────────── -->
  <div class="card">
    <h3 style="margin-top:0">Connection log</h3>
    <pre id="log"></pre>
  </div>

  <script>
    // ── Helpers ──────────────────────────────────────────────────────────────

    function ts() { return new Date().toISOString().slice(11, 23); }

    function log(msg, cls) {
      const el = document.getElementById('log');
      const line = document.createElement('span');
      line.className = cls || '';
      line.textContent = '[' + ts() + '] ' + msg + '\n';
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(msg, cls) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = cls || '';
    }

    function getIceConfigs() {
      const turnUrl  = document.getElementById('turn-url').value.trim();
      const turnUser = document.getElementById('turn-user').value.trim();
      const turnPass = document.getElementById('turn-pass').value.trim();

      const configs = [
        { label: 'No ICE servers',  cfg: { iceServers: [] } },
        { label: 'STUN (Google)',   cfg: { iceServers: [{ urls: ['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302'] }] } },
      ];

      if (turnUrl && turnUser && turnPass) {
        configs.push({
          label: 'STUN + TURN (custom)',
          cfg: { iceServers: [
            { urls: ['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302'] },
            { urls: turnUrl,                            username: turnUser, credential: turnPass },
            { urls: turnUrl.replace(':80',':443').replace('turn:','turns:'), username: turnUser, credential: turnPass },
          ]}
        });
      } else {
        configs.push({
          label: 'STUN + TURN (openrelay)',
          cfg: { iceServers: [
            { urls: ['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302'] },
            { urls: 'turn:openrelay.metered.ca:80',               username: 'openrelayproject', credential: 'openrelayproject' },
            { urls: 'turn:openrelay.metered.ca:443',              username: 'openrelayproject', credential: 'openrelayproject' },
            { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
          ]}
        });
      }

      return configs;
    }

    // ── Phase 1: gather diagnostic ───────────────────────────────────────────

    async function gatherTest(label, cfg) {
      const start = Date.now();
      const counts = { host: 0, srflx: 0, relay: 0 };
      const pc = new RTCPeerConnection(cfg);
      pc.createDataChannel('probe');

      const done = new Promise((resolve, reject) => {
        const timeout = setTimeout(() => { pc.close(); reject(new Error('timeout')); }, 8000);
        pc.onicegatheringstatechange = () => {
          if (pc.iceGatheringState === 'complete') { clearTimeout(timeout); resolve(); }
        };
        pc.onicecandidate = e => {
          if (e.candidate) counts[e.candidate.type] = (counts[e.candidate.type] || 0) + 1;
        };
      });

      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await done;
        pc.close();
        return { ok: true, counts, ms: Date.now() - start };
      } catch (err) {
        pc.close();
        return { ok: false, error: err.message, counts, ms: Date.now() - start };
      }
    }

    document.getElementById('btn-gather').addEventListener('click', async () => {
      const btn = document.getElementById('btn-gather');
      btn.disabled = true;
      btn.textContent = 'Running…';
      document.getElementById('gather-body').innerHTML = '';

      const configs = getIceConfigs();

      for (const { label, cfg } of configs) {
        log('Gather: ' + label + '…');
        const row = document.getElementById('gather-body').insertRow();
        row.insertCell().textContent = label;
        const hCell = row.insertCell(); hCell.textContent = '…';
        const sCell = row.insertCell(); sCell.textContent = '…';
        const rCell = row.insertCell(); rCell.textContent = '…';
        const tCell = row.insertCell(); tCell.textContent = '…';
        const resCell = row.insertCell(); resCell.textContent = '…';

        const result = await gatherTest(label, cfg);

        hCell.textContent = result.counts.host  || 0;
        sCell.textContent = result.counts.srflx || 0;
        rCell.textContent = result.counts.relay || 0;
        tCell.textContent = result.ms;

        if (!result.ok) {
          resCell.textContent = 'error: ' + result.error;
          resCell.className = 'err';
          log('  → error: ' + result.error, 'err');
        } else if (result.counts.relay) {
          resCell.textContent = 'relay OK';
          resCell.className = 'ok';
          log('  → relay candidates gathered ✓', 'ok');
        } else if (result.counts.srflx) {
          resCell.textContent = 'srflx only';
          resCell.className = 'warn';
          log('  → srflx only (P2P may fail if sharer has symmetric NAT)', 'warn');
        } else {
          resCell.textContent = 'host only';
          resCell.className = 'err';
          log('  → host only', 'err');
        }
      }

      btn.disabled = false;
      btn.textContent = 'Run gather test';
      log('Gather phase complete.');
    });

    // ── Phase 2: connection test ──────────────────────────────────────────────

    document.getElementById('btn-connect').addEventListener('click', async () => {
      const raw = document.getElementById('offer-in').value.trim();
      if (!raw) return;

      let offer;
      try { offer = JSON.parse(atob(raw)); }
      catch (e) { setStatus('Bad offer code: ' + e.message, 'err'); return; }

      const cfg = getIceConfigs().slice(-1)[0].cfg;
      log('Creating answer with config: ' + JSON.stringify(cfg.iceServers.map(s => s.urls)));

      const sdpCandidates = offer.sdp.match(/^a=candidate:.+$/mg) || [];
      log('Candidates in offer SDP:');
      sdpCandidates.forEach(c => log('  ' + c.split(' ').slice(6, 10).join(' ')));

      const pc = new RTCPeerConnection(cfg);

      let connectStart;
      pc.ondatachannel = e => {
        const dc = e.channel;
        dc.onopen = () => {
          const rtt = Date.now() - connectStart;
          log('DataChannel open — connection established in ' + rtt + 'ms total', 'ok');
          setStatus('Connected!', 'ok');
        };
        dc.onmessage = ev => {
          log('Received: ' + ev.data + ' — replying with pong…', 'ok');
          setStatus('Got: ' + ev.data + ' — replying…', 'ok');
          dc.send('pong');
        };
        dc.onerror = ev => log('DataChannel error: ' + ev, 'err');
      };

      pc.onicecandidate = e => {
        if (e.candidate) log('  candidate: ' + e.candidate.type + ' ' + e.candidate.address + ':' + e.candidate.port);
      };

      pc.oniceconnectionstatechange = () => {
        log('iceConnectionState → ' + pc.iceConnectionState,
          pc.iceConnectionState === 'connected' ? 'ok' :
          ['failed','disconnected','closed'].includes(pc.iceConnectionState) ? 'err' : '');
        if (['failed','disconnected','closed'].includes(pc.iceConnectionState))
          setStatus('ICE: ' + pc.iceConnectionState, 'err');
      };

      pc.onicegatheringstatechange = () => log('gatheringState → ' + pc.iceGatheringState);

      pc.onconnectionstatechange = () => log('connectionState → ' + pc.connectionState,
        pc.connectionState === 'connected' ? 'ok' :
        ['failed','disconnected','closed'].includes(pc.connectionState) ? 'err' : '');

      await pc.setRemoteDescription(offer);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      log('Local description set, gathering ICE candidates…');

      connectStart = Date.now();

      await new Promise(res => {
        if (pc.iceGatheringState === 'complete') return res();
        const prev = pc.onicegatheringstatechange;
        pc.onicegatheringstatechange = () => { prev(); if (pc.iceGatheringState === 'complete') res(); };
      });

      const answerCandidates = pc.localDescription.sdp.match(/^a=candidate:.+$/mg) || [];
      log('Candidates in answer SDP:');
      answerCandidates.forEach(c => log('  ' + c.split(' ').slice(6, 10).join(' ')));

      document.getElementById('answer-out').value = btoa(JSON.stringify(pc.localDescription));
      setStatus('Answer ready — copy the code above and send it to the sharer.');
    });
  </script>
</body>
</html>
