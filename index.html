<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamShare — Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0e10;
      --surface: #18181b;
      --border:  #27272a;
      --accent:  #e2ff5d;
      --text:    #fafafa;
      --muted:   #71717a;
      --red:     #ff5d5d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      gap: 20px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 16px; height: 16px; }

    h1 { font-size: 18px; font-weight: 600; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card h2 { font-size: 15px; font-weight: 600; }
    .card p  { color: var(--muted); font-size: 13px; line-height: 1.5; }

    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }

    textarea {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: monospace;
      font-size: 12px;
      resize: none;
      outline: none;
    }
    textarea:focus { border-color: #3f3f46; }

    button {
      width: 100%;
      padding: 10px 16px;
      border: none; border-radius: 8px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #0e0e10;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .error {
      font-size: 13px; color: var(--red);
      background: rgba(255,93,93,0.1);
      border: 1px solid rgba(255,93,93,0.2);
      border-radius: 7px;
      padding: 9px 12px;
      display: none;
    }
    .error.visible { display: block; }

    /* ── Video area ──────────────────────────────────────────────────────── */

    #video-wrap {
      width: 100%;
      max-width: 900px;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      display: none;
      aspect-ratio: 16/9;
      position: relative;
    }

    #stream-video {
      width: 100%; height: 100%;
      display: block;
    }

    /* ── Video controls ──────────────────────────────────────────────────── */

    #video-controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 8px 12px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      opacity: 0;
      transition: opacity 0.2s;
    }
    #video-wrap:hover #video-controls,
    #video-wrap:fullscreen #video-controls { opacity: 1; }
    #video-wrap:-webkit-full-screen #video-controls { opacity: 1; }

    /* ── Volume group (button + popup slider) ── */
    #volume-group {
      position: relative;
      display: flex;
      align-items: flex-end;
    }

    #volume-popup {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      border-radius: 8px;
      padding: 10px 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    #volume-popup.open {
      opacity: 1;
      pointer-events: auto;
    }

    #volume-slider {
      -webkit-appearance: slider-vertical;
      appearance: slider-vertical;
      writing-mode: vertical-lr;
      direction: rtl;
      width: 4px;
      height: 80px;
      border-radius: 2px;
      background: rgba(255,255,255,0.3);
      outline: none;
      cursor: pointer;
      padding: 0;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    #volume-slider::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
    }

    /* ── Shared icon button style ── */
    #btn-volume, #btn-fullscreen {
      width: auto;
      padding: 4px 6px;
      background: transparent;
      border: none;
      cursor: pointer;
      opacity: 0.8;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    #btn-volume:hover, #btn-fullscreen:hover { opacity: 1; }
    #btn-volume svg, #btn-fullscreen svg { display: block; }

    /* ── Answer section ──────────────────────────────────────────────────── */

    #answer-section { display: none; }

    .step { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 13 13" fill="none">
      <path d="M2 6.5L6.5 2L11 6.5L6.5 11L2 6.5Z" fill="#0e0e10"/>
      <circle cx="6.5" cy="6.5" r="2" fill="#0e0e10"/>
    </svg>
  </div>
  <h1>StreamShare</h1>
</header>

<!-- Video (shown once stream arrives) -->
<div id="video-wrap">
  <video id="stream-video" autoplay playsinline></video>
  <div id="video-controls">
    <div id="volume-group">
      <div id="volume-popup">
        <input id="volume-slider" type="range" min="0" max="1" step="0.02" value="1" title="Volume">
      </div>
      <button id="btn-volume" title="Volume">
        <svg id="icon-volume" width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 7H6L10 4v10L6 11H3V7Z" fill="white"/>
          <path id="vol-lines" d="M12.5 6.5a3 3 0 0 1 0 5M14.5 4.5a6 6 0 0 1 0 9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line id="vol-mute-x" x1="12" y1="6" x2="17" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round" style="display:none"/>
          <line id="vol-mute-x2" x1="17" y1="6" x2="12" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round" style="display:none"/>
        </svg>
      </button>
    </div>
    <button id="btn-fullscreen" title="Fullscreen">
      <svg id="icon-expand" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M2 6V2h4M12 2h4v4M16 12v4h-4M6 16H2v-4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg id="icon-shrink" width="18" height="18" viewBox="0 0 18 18" fill="none" style="display:none">
        <path d="M6 2v4H2M16 6h-4V2M12 16v-4h4M2 12h4v4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<!-- Connect card -->
<div class="card" id="connect-card">
  <h2>Join a stream</h2>
  <p>Paste the code your friend sent you, then click Connect.</p>

  <div>
    <label>Offer code</label>
    <textarea id="offer-in" rows="5" placeholder="Paste offer code here…"></textarea>
  </div>

  <button id="btn-connect">Connect</button>
  <div class="error" id="error-msg"></div>
</div>

<!-- Answer card (shown after offer processed) -->
<div class="card" id="answer-section">
  <h2>Send this back</h2>
  <p>Copy the code below and send it to your friend.</p>

  <div>
    <label>Answer code</label>
    <textarea id="answer-out" rows="5" readonly></textarea>
  </div>

  <button id="btn-copy" class="secondary">Copy code</button>
</div>

<script>
  const STUN = ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'];

  async function compress(str) {
    const bytes = new TextEncoder().encode(str);
    const cs = new CompressionStream('deflate-raw');
    const writer = cs.writable.getWriter();
    writer.write(bytes);
    writer.close();
    const chunks = [];
    const reader = cs.readable.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const out = new Uint8Array(chunks.reduce((n, c) => n + c.length, 0));
    let off = 0;
    for (const c of chunks) { out.set(c, off); off += c.length; }
    let bin = '';
    for (let i = 0; i < out.length; i++) bin += String.fromCharCode(out[i]);
    return btoa(bin);
  }

  async function decompress(b64) {
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const ds = new DecompressionStream('deflate-raw');
    const writer = ds.writable.getWriter();
    writer.write(bytes);
    writer.close();
    const chunks = [];
    const reader = ds.readable.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const out = new Uint8Array(chunks.reduce((n, c) => n + c.length, 0));
    let off = 0;
    for (const c of chunks) { out.set(c, off); off += c.length; }
    return new TextDecoder().decode(out);
  }

  function relayOnlySdp(desc) {
    const lines = desc.sdp.split('\n');
    const relayCandidates = lines.filter(l => l.startsWith('a=candidate:') && l.includes('typ relay'));
    // Only filter if we actually have relay candidates — otherwise keep all
    if (!relayCandidates.length) return desc;
    const sdp = lines.filter(l => !l.startsWith('a=candidate:') || l.includes('typ relay')).join('\n');
    return { ...desc, sdp };
  }

  let pc;  // module-scope so GC doesn't collect it after answer is generated

  function setError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.toggle('visible', !!msg);
  }

  document.getElementById('btn-connect').addEventListener('click', async () => {
    const raw = document.getElementById('offer-in').value.trim();
    if (!raw) { setError('Paste an offer code first.'); return; }

    let parsed;
    try {
      // Try compressed format first, fall back to legacy plain btoa
      let json;
      try { json = await decompress(raw); }
      catch (_) { json = atob(raw); }
      parsed = JSON.parse(json);
    } catch (e) { setError('Invalid offer code: ' + e.message); return; }

    const btn = document.getElementById('btn-connect');
    btn.disabled = true;
    btn.textContent = 'Connecting…';
    setError('');

    // Use ICE servers embedded in the offer by the sharer
    const iceServers = parsed.iceServers ?? [{ urls: STUN }];
    const iceConfig  = { iceServers };

    if (pc) pc.close();
    pc = new RTCPeerConnection(iceConfig);

    // Attach tracks when they arrive, but only reveal the video once it's actually playing
    pc.ontrack = e => {
      const video = document.getElementById('stream-video');
      if (!video.srcObject) {
        video.srcObject = e.streams[0] ?? new MediaStream([e.track]);
        video.onplaying = () => {
          document.getElementById('video-wrap').style.display = 'block';
          document.getElementById('answer-section').style.display = 'none';
        };
      } else {
        e.streams[0]?.getTracks().forEach(t => video.srcObject.addTrack(t));
      }
    };

    try {
      const offer = { type: parsed.type, sdp: parsed.sdp };
      await pc.setRemoteDescription(offer);
      await pc.setLocalDescription(await pc.createAnswer());

      // 2 second cap — relay candidates gather fast, TCP candidates can take 30s+
      await Promise.race([
        new Promise(res => {
          if (pc.iceGatheringState === 'complete') return res();
          pc.addEventListener('icegatheringstatechange', function h() {
            if (pc.iceGatheringState === 'complete') { pc.removeEventListener('icegatheringstatechange', h); res(); }
          });
        }),
        new Promise(res => setTimeout(res, 2000))
      ]);

      const answerCode = await compress(JSON.stringify(relayOnlySdp(pc.localDescription.toJSON())));
      document.getElementById('answer-out').value = answerCode;
      document.getElementById('answer-section').style.display = 'flex';
      document.getElementById('connect-card').style.display = 'none';

    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Connect';
      setError('Connection failed: ' + e.message);
    }
  });

  document.getElementById('btn-copy').addEventListener('click', () => {
    navigator.clipboard.writeText(document.getElementById('answer-out').value).then(() => {
      document.getElementById('btn-copy').textContent = 'Copied!';
      setTimeout(() => { document.getElementById('btn-copy').textContent = 'Copy code'; }, 1500);
    });
  });

  // ── Volume ─────────────────────────────────────────────────────────────────
  const volumePopup  = document.getElementById('volume-popup');
  const volumeSlider = document.getElementById('volume-slider');
  const volLines     = document.getElementById('vol-lines');
  const volMuteX     = document.getElementById('vol-mute-x');
  const volMuteX2    = document.getElementById('vol-mute-x2');

  document.getElementById('btn-volume').addEventListener('click', () => {
    volumePopup.classList.toggle('open');
  });

  // Close popup when clicking outside the volume group
  document.addEventListener('click', e => {
    if (!document.getElementById('volume-group').contains(e.target)) {
      volumePopup.classList.remove('open');
    }
  });

  volumeSlider.addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    document.getElementById('stream-video').volume = v;
    const muted = v === 0;
    volLines.style.display  = muted ? 'none' : '';
    volMuteX.style.display  = muted ? '' : 'none';
    volMuteX2.style.display = muted ? '' : 'none';
  });

  // ── Fullscreen ─────────────────────────────────────────────────────────────
  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    const wrap = document.getElementById('video-wrap');
    if (!document.fullscreenElement) {
      wrap.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  });

  document.addEventListener('fullscreenchange', () => {
    const inFs = !!document.fullscreenElement;
    document.getElementById('icon-expand').style.display = inFs ? 'none' : '';
    document.getElementById('icon-shrink').style.display = inFs ? '' : 'none';
  });
</script>
</body>
</html>
